<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstrační firmware pro ESP32</title>

    <link rel="stylesheet" type="text/css" href="/style-main.css">
</head>
<body>

<header>Hlavní menu</header>

<div class="container">
    <div class="card">
        <!-- Hlavní navigace mezi moduly webového rozhraní -->
        <nav class="menu-grid">
            <a href="#" id="ppgLink" class="menu-button">PPG</a>
            <a href="#" id="levelLink" class="menu-button">Gyroskop</a>
            <a href="#" id="snakeLink" class="menu-button">Had</a>
            <a href="#" id="rgbLink" class="menu-button">Ovládání barevné LED</a>
        </nav>
    </div>
</div>

<footer>Demonstrační firmware pro ESP32</footer>

<script>
// Přesměrování na modul RGB
document.getElementById("rgbLink").addEventListener("click", function(e){
    e.preventDefault();
    window.location.href = '/rgb';
});

// Přesměrování na modul Had
document.getElementById("snakeLink").addEventListener("click", function(e){
    e.preventDefault();
    window.location.href = '/snake';
});

// Přesměrování na modul MPU6050
document.getElementById("levelLink").addEventListener("click", function(e){
    e.preventDefault();
    window.location.href = '/level';
});

// Přesměrování na modul PPG
document.getElementById("ppgLink").addEventListener("click", function(e){
    e.preventDefault();
    window.location.href = '/ppg';
});
</script>

</body>
</html>
