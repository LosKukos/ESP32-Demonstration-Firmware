<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabulka nejlepších výsledků</title>
    <link rel="stylesheet" type="text/css" href="/style-snake.css">
</head>
<body>

<header>Tabulka nejlepších výsledků</header>

<div class="container">

    <div class="card">
        <h3>Nejlepší výsledky</h3>
        <div class="table-wrapper">
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Jméno</th>
                        <th>Obtížnost</th>
                        <th>Ovoce</th>
                        <th>Skóre</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3>Uložit výsledek</h3>
        <div class="form-row">
            <input id="playerName" placeholder="Zadej jméno" maxlength="20">
            <button onclick="saveName()">Uložit</button>
        </div>
    </div>

    <div class="card">
        <h3>Obtížnost</h3>
        <div class="button-grid">
            <button onclick="setDifficulty(0)">Lehká</button>
            <button onclick="setDifficulty(1)">Střední</button>
            <button onclick="setDifficulty(2)">Těžká</button>
            <button onclick="setDifficulty(3)">Chaos</button>
        </div>
    </div>

    <div class="card">
        <h3>Akce</h3>
        <div class="actions-grid">
            <button onclick="clearLeaderboard()">Vymazat záznamy</button>
            <button onclick="goBack()">Zpět</button>
        </div>
    </div>

</div>

<footer>Demonstrační firmware pro ESP32</footer>

<script>
function setDifficulty(level) {
    fetch('/snake/setDifficulty?level=' + level);
}

function saveName() {
    const name = document.getElementById("playerName").value.trim();

    if (name.length > 0) {
        fetch('/snake/setName?name=' + encodeURIComponent(name))
            .then(() => {
                document.getElementById("playerName").value = '';
                updateLeaderboard();
            });
    }
}

function clearLeaderboard() {
    if (confirm("Opravdu smazat všechny záznamy?")) {
        fetch('/snake/clearLeaderboard')
            .then(() => {
                updateLeaderboard();
            });
    }
}

function goBack() {
    fetch('/snake/exit')
        .then(() => {
            window.location.href = '/';
        });
}

function updateLeaderboard() {
    fetch('/snake/leaderboard')
        .then(resp => {
            if (!resp.ok) throw new Error("Network error");
            return resp.json();
        })
        .then(data => {
            let tbody = '';

            data.forEach(item => {
                tbody += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.difficulty}</td>
                        <td>${item.fruits ?? "-"}</td>
                        <td>${item.score ?? "-"}</td>
                    </tr>
                `;
            });

            document.getElementById('leaderboardBody').innerHTML = tbody;
        })
        .catch(err => {
            console.log("Leaderboard error:", err);
        });
}

setInterval(updateLeaderboard, 2000);
updateLeaderboard();
</script>

</body>
</html>
