<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPG Monitor</title>

    <link rel="stylesheet" type="text/css" href="/style-main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>PPG Monitor</header>

<div class="container">

    <!-- KPI karty -->
    <div class="card metrics">
        <div class="metric">
            <p>BPM</p>
            <h2 id="bpm">--</h2>
        </div>

        <div class="metric">
            <p>HRV (RMSSD)</p>
            <h2 id="hrv">--</h2>
        </div>

        <div class="metric">
            <p>Stav</p>
            <h2 id="status">--</h2>
        </div>
    </div>

    <!-- COMBINED graf -->
    <div class="card">
        <canvas id="combinedChart"></canvas>
    </div>

</div>

<footer>Demonstrační firmware pro ESP32</footer>

<script>
async function fetchData() {
    const res = await fetch('/ppg/update');
    return await res.json();
}

// --- Combined chart (BPM + HRV with dual Y axes) ---
const combinedChart = new Chart(document.getElementById('combinedChart'), {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: 'BPM',
                data: [],
                yAxisID: 'y'
            },
            {
                label: 'HRV (RMSSD)',
                data: [],
                yAxisID: 'y1'
            }
        ]
    },
    options: {
        responsive: true,
        interaction: {
            mode: 'index',
            intersect: false
        },
        stacked: false,
        scales: {
            y: {
                type: 'linear',
                position: 'left',
                title: {
                    display: true,
                    text: 'BPM'
                }
            },
            y1: {
                type: 'linear',
                position: 'right',
                title: {
                    display: true,
                    text: 'HRV (RMSSD)'
                },
                grid: {
                    drawOnChartArea: false
                }
            }
        }
    }
});

async function update() {
    const data = await fetchData();

    const bpmEl = document.getElementById("bpm");
    const hrvEl = document.getElementById("hrv");
    const statusEl = document.getElementById("status");

    // --- UI ---
    bpmEl.innerText = Number.isFinite(data.bpm) ? data.bpm : "--";

    hrvEl.innerText =
        Number.isFinite(data.hrv) ? data.hrv.toFixed(1) : "--";

    // --- status bez bpmValid ---
    const validRR = data.rr && data.rr.filter(v => v > 0).length > 5;
    statusEl.innerText = validRR ? "OK" : "NO SIGNAL";

    const now = new Date().toLocaleTimeString();

    // --- Chart update ---
    combinedChart.data.labels.push(now);

    combinedChart.data.datasets[0].data.push(data.bpm ?? null);
    combinedChart.data.datasets[1].data.push(
        Number.isFinite(data.hrv) ? data.hrv : null
    );

    if (combinedChart.data.labels.length > 50) {
        combinedChart.data.labels.shift();
        combinedChart.data.datasets[0].data.shift();
        combinedChart.data.datasets[1].data.shift();
    }

    combinedChart.update();
}

// refresh každou sekundu
setInterval(update, 1000);
</script>

</body>
</html>
